<!DOCTYPE html>
<html>
<head>
    <title>Simple 1v1 Basketball</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a1d; color: white; margin: 0; overflow: hidden; }
        #gameCanvas { background-color: #222; border-bottom: 8px solid #e67e22; display: block; margin: auto; cursor: crosshair; }
        
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; gap: 40px; pointer-events: none; }
        .score-box { background: rgba(0,0,0,0.8); padding: 10px 25px; border: 2px solid #f1c40f; font-size: 28px; border-radius: 8px; font-family: monospace; display: flex; flex-direction: column; align-items: center; }
        .energy-container { display: flex; gap: 3px; margin-top: 5px; }
        .energy-bar { width: 15px; height: 6px; background: #555; border-radius: 2px; }
        .energy-filled { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }

        #chatContainer { position: absolute; bottom: 20px; left: 20px; width: 250px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 5px; }
        #chatBox { height: 80px; overflow-y: auto; font-size: 11px; text-align: left; margin-bottom: 5px; color: #ddd; }
        #chatInput { width: 100%; background: #333; border: 1px solid #444; color: white; padding: 4px; }
        #setup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 30px; border-radius: 12px; z-index: 10; border: 2px solid #e67e22; }
    </style>
</head>
<body>

<div id="setup">
    <h2>🏀 Simple 1v1 Basketball</h2>
    <input id="name" placeholder="Name" style="padding:10px; margin:5px;"><br>
    <input id="room" placeholder="Court Code" style="padding:10px; margin:5px;"><br>
    <button onclick="joinRoom()" style="padding:10px 20px; margin-top:10px; background:#e67e22; color:white; border:none; cursor:pointer; font-weight:bold;">ENTER ARENA</button>
</div>

<div class="ui">
    <div class="score-box">
        <span id="s1">0</span>
        <div class="energy-container" id="myEnergyUI"></div>
    </div>
    <div style="font-size: 30px; color: #f1c40f; padding-top: 10px;">VS</div>
    <div class="score-box">
        <span id="s2">0</span>
        <div class="energy-container" id="enemyEnergyUI"></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="chatContainer" style="display:none;">
    <div id="chatBox"></div>
    <input id="chatInput" placeholder="Press Enter to chat...">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
        authDomain: "mindbattle-f00a3.firebaseapp.com",
        databaseURL: "https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mindbattle-f00a3",
        storageBucket: "mindbattle-f00a3.firebasestorage.app",
        messagingSenderId: "286675354503",
        appId: "1:286675354503:web:00a87613f420cd07a30922"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 900; canvas.height = 500;

    let room = "", playerName = "", playerId = Math.random().toString(36).substring(7);
    let players = {}, ball = { x: 450, y: 50, vx: 0, vy: 0, holder: null };
    let myPos = { x: 150, y: 405, vy: 0, score: 0, energy: 3 };
    let lastClickTime = 0, lastReleaseTime = { KeyA: 0, KeyD: 0 };
    let toast = { text: "", opacity: 0, x: 0, y: 0, color: "#f1c40f" };
    
    const gravity = 0.6;
    const keys = {};
    const playerWidth = 35;
    const playerHeight = 60;

    window.joinRoom = function() {
        playerName = document.getElementById("name").value || "Player";
        room = document.getElementById("room").value;
        if(!room) return;
        document.getElementById("setup").style.display = "none";
        document.getElementById("chatContainer").style.display = "block";
        
        onValue(ref(db, `rooms/${room}/players`), s => {
            players = s.val() || {};
            updateEnergyUI("myEnergyUI", myPos.energy);
            Object.keys(players).forEach(id => {
                if(id !== playerId) {
                    document.getElementById("s2").innerText = players[id].score || 0;
                    updateEnergyUI("enemyEnergyUI", players[id].energy || 0);
                }
            });
        });
        onValue(ref(db, `rooms/${room}/ball`), s => { if(s.val() && ball.holder !== playerId) ball = s.val(); });
        onValue(ref(db, `rooms/${room}/chat`), s => {
            const cb = document.getElementById("chatBox"); cb.innerHTML = "";
            if(s.val()) Object.values(s.val()).slice(-5).forEach(m => cb.innerHTML += `<div><b>${m.name}:</b> ${m.text}</div>`);
            cb.scrollTop = cb.scrollHeight;
        });
        gameLoop();
    };

    function updateEnergyUI(elementId, energyCount) {
        let html = "";
        for(let i=0; i<5; i++) {
            html += `<div class="energy-bar ${i < energyCount ? 'energy-filled' : ''}"></div>`;
        }
        document.getElementById(elementId).innerHTML = html;
    }

    // --- CONTROLS & DASH FIX ---
    window.addEventListener("keyup", e => {
        keys[e.code] = false;
        if(e.code === 'KeyA' || e.code === 'KeyD') lastReleaseTime[e.code] = Date.now();
    });

    window.addEventListener("keydown", e => {
        if(document.activeElement.id === 'chatInput') {
            if(e.key === "Enter") sendChat();
            return;
        }
        if(keys[e.code]) return; // Prevent holding trigger
        keys[e.code] = true;

        // Dash Logic (Requires 1 Energy)
        if((e.code === 'KeyA' || e.code === 'KeyD') && myPos.energy >= 1) {
            if(Date.now() - lastReleaseTime[e.code] < 200) {
                let dashDir = e.code === 'KeyD' ? 90 : -90;
                myPos.x += dashDir;
                myPos.energy--;
            }
        }
        if(e.key === "Enter") document.getElementById("chatInput").focus();
    });

    // --- RIGHT CLICK: STEAL ---
    canvas.oncontextmenu = (e) => { 
        e.preventDefault();
        if(myPos.energy < 1) return; // Need energy to steal

        Object.keys(players).forEach(id => {
            if(id !== playerId && ball.holder === id) {
                let dist = Math.hypot(myPos.x - players[id].x, myPos.y - players[id].y);
                if(dist < 60) {
                    ball.holder = playerId;
                    myPos.energy--;
                    update(ref(db, `rooms/${room}/ball`), ball);
                }
            }
        });
    };

    // --- LEFT CLICK: SHOOT & DUNK ---
    canvas.addEventListener("mousedown", e => {
        if(e.button === 0 && ball.holder === playerId) {
            const now = Date.now();
            const inDunkZone = (myPos.x < 120 || myPos.x > 745);
            
            if(now - lastClickTime < 250 && inDunkZone) { 
                // Double Click Dunk
                ball.vx = (myPos.x < 450 ? 10 : -10); ball.vy = 18;
                showToast("WHAT A DUNK!!", "#e74c3c");
                ball.holder = null;
            } else { 
                // Normal Shot
                const rect = canvas.getBoundingClientRect();
                ball.vx = ((e.clientX - rect.left) - myPos.x) * 0.07;
                ball.vy = ((e.clientY - rect.top) - myPos.y) * 0.07;
                ball.holder = null;
            }
            lastClickTime = now;
            update(ref(db, `rooms/${room}/ball`), ball);
        }
    });

    function showToast(txt, color = "#f1c40f") { toast = { text: txt, opacity: 1, x: 450, y: 150, color: color }; }

    function updateLogic() {
        // Player Collision Prediction
        let nextX = myPos.x;
        if(keys['KeyA']) nextX -= 5; 
        if(keys['KeyD']) nextX += 5;

        let collision = false;
        Object.keys(players).forEach(id => {
            if(id !== playerId) {
                let ex = players[id].x, ey = players[id].y;
                if(nextX < ex + playerWidth && nextX + playerWidth > ex && myPos.y < ey + playerHeight && myPos.y + playerHeight > ey) {
                    collision = true; // Body block!
                }
            }
        });

        if(!collision) myPos.x = nextX;

        // Jump
        if(keys['KeyW'] && myPos.y >= 405) myPos.vy = -13;

        // Gravity & Y Boundaries
        myPos.vy += gravity; 
        myPos.y += myPos.vy;
        if(myPos.y > 405) { myPos.y = 405; myPos.vy = 0; } // Floor
        if(myPos.y < 0) { myPos.y = 0; myPos.vy = 1; } // Ceiling bump

        // X Boundaries (Side Walls)
        if(myPos.x < 0) myPos.x = 0;
        if(myPos.x > 900 - playerWidth) myPos.x = 900 - playerWidth;

        // --- BALL PHYSICS ---
        if(!ball.holder) {
            ball.vy += gravity; ball.x += ball.vx; ball.y += ball.vy;
            
            // Ball Wall Bounces
            if(ball.y > 450) { ball.y = 450; ball.vy *= -0.6; ball.vx *= 0.8; } // Floor
            if(ball.y < 0) { ball.y = 0; ball.vy *= -0.5; } // Ceiling
            if(ball.x < 0) { ball.x = 0; ball.vx *= -0.5; } // Left Wall
            if(ball.x > 900) { ball.x = 900; ball.vx *= -0.5; } // Right Wall

            // Goal detection
            if(ball.y < 250 && ball.y > 200) {
                if(ball.x < 40 || ball.x > 860) {
                    const isThree = (ball.vx > 13 || ball.vx < -13 || ball.x > 450 && myPos.x < 450 || myPos.x > 600 && ball.x < 300);
                    myPos.score += isThree ? 3 : 2;
                    if(myPos.energy < 5) myPos.energy += 1; // Score Reward
                    
                    showToast(isThree ? "3 POINTS! CURRY!" : "NICE SHOT!");
                    ball = { x: 450, y: 50, vx: 0, vy: 0, holder: null }; // Reset high drop
                }
            }

            // Snatch / Pickup Logic
            if(Math.hypot(myPos.x + 17 - ball.x, myPos.y + 30 - ball.y) < 40) ball.holder = playerId;

        } else if(ball.holder === playerId) { 
            // Hold ball slightly in front of player
            ball.x = myPos.x + 17; ball.y = myPos.y + 10; 
        }

        // Sync Data
        update(ref(db, `rooms/${room}/players/${playerId}`), { x: myPos.x, y: myPos.y, score: myPos.score, energy: myPos.energy, name: playerName });
        if(ball.holder === playerId || !ball.holder) update(ref(db, `rooms/${room}/ball`), ball);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Lines
        ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(450, 0); ctx.lineTo(450, 500); ctx.stroke(); // Half court
        ctx.beginPath(); ctx.arc(0, 230, 250, -Math.PI/2, Math.PI/2); ctx.stroke(); // Left 3PT Arc
        ctx.beginPath(); ctx.arc(900, 230, 250, Math.PI/2, 3*Math.PI/2); ctx.stroke(); // Right 3PT Arc

        ctx.fillStyle = "#34495e"; ctx.fillRect(0, 465, 900, 35); // Floor
        ctx.fillStyle = "#e74c3c"; ctx.fillRect(0, 230, 40, 8); ctx.fillRect(860, 230, 40, 8); // Hoops
        
        // Ball
        ctx.fillStyle = "#e67e22"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 12, 0, Math.PI*2); ctx.fill(); 

        // Players
        Object.keys(players).forEach(id => {
            const p = players[id];
            ctx.fillStyle = id === playerId ? "#3498db" : "#95a5a6";
            ctx.fillRect(p.x, p.y, playerWidth, playerHeight);
            ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
            ctx.fillText(p.name, p.x + 17, p.y - 10);
        });

        // Toast Text
        if(toast.opacity > 0) {
            ctx.fillStyle = toast.color; 
            ctx.globalAlpha = toast.opacity;
            ctx.font = "bold 28px Arial"; ctx.textAlign = "center";
            ctx.fillText(toast.text, toast.x, toast.y); 
            toast.opacity -= 0.01; toast.y -= 0.5;
            ctx.globalAlpha = 1.0;
        }

        document.getElementById("s1").innerText = myPos.score;
    }

    function sendChat() {
        const i = document.getElementById("chatInput"); if(!i.value) return;
        push(ref(db, `rooms/${room}/chat`), { name: playerName, text: i.value }); i.value = ""; i.blur();
    }

    function gameLoop() { updateLogic(); draw(); requestAnimationFrame(gameLoop); }
</script>
</body>
</html>
