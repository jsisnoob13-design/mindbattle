<!DOCTYPE html>
<html>
<head>
<title>Mind Battle PvP</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

button{
padding:12px;
margin:10px;
font-size:18px;
cursor:pointer;
}

#log{
margin-top:20px;
font-size:18px;
}

.bar{
height:20px;
background:red;
margin:auto;
width:200px;
}

.energy{
background:orange;
}
</style>

</head>

<body>

<h1>Mind Battle PvP</h1>

<input id="room" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

<br><br>

<button onclick="sendAction('attack')">⚔ Attack</button>
<button onclick="sendAction('defend')">🛡 Defend</button>
<button onclick="sendAction('charge')">⚡ Charge</button>
<button onclick="sendAction('power')">💥 Power</button>

<h3 id="status">Waiting...</h3>

<h3>HP</h3>
<div class="bar" id="hpbar"></div>

<h3>Energy</h3>
<div class="bar energy" id="energybar"></div>

<div id="log"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
authDomain:"mindbattle-f00a3.firebaseapp.com",
databaseURL:"https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"mindbattle-f00a3",
storageBucket:"mindbattle-f00a3.firebasestorage.app",
messagingSenderId:"286675354503",
appId:"1:286675354503:web:00a87613f420cd07a30922"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room="";
let playerId=Math.random().toString(36).substring(2);

let hp=10
let energy=2

function updateUI(){

document.getElementById("hpbar").style.width=(hp*20)+"px"
document.getElementById("energybar").style.width=(energy*20)+"px"

}

window.joinRoom=function(){

room=document.getElementById("room").value

document.getElementById("status").innerText="Joined "+room

const roomRef=ref(db,"rooms/"+room)

onValue(roomRef,(snapshot)=>{

const data=snapshot.val()

if(!data)return

let players=Object.values(data)

if(players.length<2)return

let p1=players[0]
let p2=players[1]

resolveBattle(p1.action,p2.action)

})

}

function resolveBattle(a,b){

let log=""

if(a=="attack" && b=="charge"){
log="Attack hits charging enemy!"
hp-=2
}

else if(a=="attack" && b=="defend"){
log="Attack blocked!"
}

else if(a=="charge"){
energy+=1
log="You charged energy"
}

else if(a=="power"){

if(energy>=2){
energy-=2
hp-=4
log="Power attack!"
}else{
log="Not enough energy"
}

}

updateUI()

document.getElementById("log").innerText=log

if(hp<=0){

document.getElementById("status").innerText="💀 You Lost"

}

}

window.sendAction=function(action){

set(ref(db,"rooms/"+room+"/"+playerId),{
action:action
})

}

updateUI()

</script>

</body>
</html>
