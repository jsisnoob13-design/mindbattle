<!DOCTYPE html>
<html>
<head>
<title>Mind Battle PvP</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

button{
padding:10px;
margin:6px;
font-size:16px;
cursor:pointer;
}

#chatBox{
height:150px;
overflow:auto;
border:1px solid white;
width:320px;
margin:auto;
padding:10px;
}

.rules{
width:420px;
margin:auto;
text-align:left;
}

#history{
margin-top:15px;
font-size:14px;
}

</style>

</head>

<body>

<h1>Mind Battle PvP</h1>

<div class="rules">

<b>Rules</b>

<ul>
<li>Rock beats Scissors</li>
<li>Scissors beats Paper</li>
<li>Paper beats Rock</li>
<li>Gun beats everything</li>
<li>Gun vs Gun = Draw</li>
<li>First to lose all hearts loses</li>
</ul>

</div>

<br>

<input id="name" placeholder="Your name">

<br><br>

<input id="room" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

<h3 id="status">Waiting...</h3>

<h3>HP</h3>

<div id="myHP"></div>
<div id="enemyHP"></div>

<br>

<button onclick="sendAction('rock')">🪨 Rock</button>
<button onclick="sendAction('paper')">📄 Paper</button>
<button onclick="sendAction('scissors')">✂ Scissors</button>
<button onclick="sendAction('gun')">💥 Gun</button>

<h3 id="result"></h3>

<h2>Score</h2>
<div id="score"></div>

<h2>Round History</h2>
<div id="history"></div>

<button onclick="restartGame()">Restart Match</button>

<h2>Chat</h2>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Type message">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
authDomain:"mindbattle-f00a3.firebaseapp.com",
databaseURL:"https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"mindbattle-f00a3",
storageBucket:"mindbattle-f00a3.firebasestorage.app",
messagingSenderId:"286675354503",
appId:"1:286675354503:web:00a87613f420cd07a30922"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

let room=""
let playerName=""
let playerId=Math.random().toString(36).substring(2)

let hp=10
let enemyHP=10

let history=[]
let score={}

function drawHP(){

let hearts=""
for(let i=0;i<hp;i++) hearts+="❤️ "
document.getElementById("myHP").innerText=playerName+": "+hearts

let enemyHearts=""
for(let i=0;i<enemyHP;i++) enemyHearts+="❤️ "
document.getElementById("enemyHP").innerText="Opponent: "+enemyHearts

}

function drawHistory(){

let text=""

history.forEach(r=>{
text=r+"<br>"+text
})

document.getElementById("history").innerHTML=text

}

function drawScore(){

let text=""

for(let p in score){
text+=p+" : "+score[p]+"<br>"
}

document.getElementById("score").innerHTML=text

}

window.joinRoom=function(){

playerName=document.getElementById("name").value
room=document.getElementById("room").value

document.getElementById("status").innerText="Joined "+room

listenActions()
listenChat()

drawHP()

}

function resolveBattle(a,b){

let p1=a
let p2=b

let winner="draw"

if(p1.action==="gun" && p2.action!=="gun") winner=p1
else if(p2.action==="gun" && p1.action!=="gun") winner=p2

else if(p1.action==="rock" && p2.action==="scissors") winner=p1
else if(p1.action==="scissors" && p2.action==="paper") winner=p1
else if(p1.action==="paper" && p2.action==="rock") winner=p1

else if(p2.action==="rock" && p1.action==="scissors") winner=p2
else if(p2.action==="scissors" && p1.action==="paper") winner=p2
else if(p2.action==="paper" && p1.action==="rock") winner=p2

let roundText=""

if(winner==="draw"){

roundText="Draw - "+p1.action+" vs "+p2.action

}else{

if(winner.player===playerId){

enemyHP--

roundText="Round: "+playerName+" win ("+p1.action+" vs "+p2.action+")"

}else{

hp--

roundText="Round: Opponent win ("+p1.action+" vs "+p2.action+")"

}

}

history.push(roundText)

drawHistory()
drawHP()

if(hp<=0){

document.getElementById("result").innerText="💀 You Lose"

if(!score["Opponent"]) score["Opponent"]=0
score["Opponent"]++

drawScore()

}

if(enemyHP<=0){

document.getElementById("result").innerText="🎉 You Win"

if(!score[playerName]) score[playerName]=0
score[playerName]++

drawScore()

}

}

function listenActions(){

const actionsRef=ref(db,"rooms/"+room+"/actions")

onValue(actionsRef,(snapshot)=>{

const data=snapshot.val()

if(!data) return

const players=Object.keys(data)

if(players.length<2) return

const a=data[players[0]]
const b=data[players[1]]

resolveBattle(a,b)

remove(actionsRef)

})

}

window.sendAction=function(action){

set(ref(db,"rooms/"+room+"/actions/"+playerId),{

player:playerId,
name:playerName,
action:action

})

}

window.restartGame=function(){

hp=10
enemyHP=10
history=[]

document.getElementById("result").innerText=""

drawHP()
drawHistory()

}

window.sendChat=function(){

const message=document.getElementById("chatInput").value

set(ref(db,"rooms/"+room+"/chat/"+Date.now()),{

name:playerName,
text:message

})

document.getElementById("chatInput").value=""

}

document.getElementById("chatInput").addEventListener("keydown",function(e){

if(e.key==="Enter"){

e.preventDefault()
sendChat()

}

})

function listenChat(){

const chatRef=ref(db,"rooms/"+room+"/chat")

onValue(chatRef,(snapshot)=>{

const data=snapshot.val()

if(!data) return

let html=""

Object.values(data).forEach(msg=>{

let color=msg.name===playerName?"#00ff88":"#4da6ff"

html+=`<div style="color:${color}"><b>${msg.name}:</b> ${msg.text}</div>`

})

document.getElementById("chatBox").innerHTML=html
document.getElementById("chatBox").scrollTop=99999

})

}

</script>

</body>
</html>
