<!DOCTYPE html>
<html>
<head>

<title>Emoji Toss PvP</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#222;
border:2px solid white;
}

button{
padding:10px;
margin:5px;
}

</style>

</head>

<body>

<h2>Emoji Toss PvP</h2>

<input id="name" placeholder="Your name">
<input id="room" placeholder="Room code">
<button onclick="joinRoom()">Join</button>

<br><br>

<canvas id="game" width="800" height="400"></canvas>

<br>

<button onclick="moveLeft()">←</button>
<button onclick="moveRight()">→</button>
<button onclick="jump()">Jump</button>

<br>

Angle
<input id="angle" type="range" min="10" max="80" value="45">

Power
<input id="power" type="range" min="2" max="12" value="6">

<button onclick="shoot()">Fire 🪨</button>

<p id="hp"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"

const firebaseConfig = {

apiKey: "AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
authDomain: "mindbattle-f00a3.firebaseapp.com",
databaseURL: "https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "mindbattle-f00a3",
storageBucket: "mindbattle-f00a3.firebasestorage.app",
messagingSenderId: "286675354503",
appId: "1:286675354503:web:00a87613f420cd07a30922"

}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const gravity = 0.6

const playerWidth = 26
const playerHeight = 26

let playerId = Math.random().toString(36).substring(2)

let room = ""
let myName = ""

let players = {}

let projectile = null

const platforms = [

{x:0,y:350,w:800,h:50},

{x:80,y:300,w:120,h:20},
{x:250,y:260,w:120,h:20},
{x:430,y:300,w:140,h:20},
{x:640,y:270,w:120,h:20},

{x:150,y:200,w:100,h:20},
{x:350,y:180,w:120,h:20},
{x:550,y:200,w:100,h:20},

{x:320,y:120,w:140,h:20}

]

window.joinRoom = function(){

myName = document.getElementById("name").value
room = document.getElementById("room").value

set(ref(db,"rooms/"+room+"/players/"+playerId),{

name: myName,
x: Math.random()*600+100,
y:0,
vy:0,
hp:10

})

listenGame()

}

function listenGame(){

onValue(ref(db,"rooms/"+room+"/players"),(snapshot)=>{

players = snapshot.val() || {}

})

}

function draw(){

ctx.clearRect(0,0,800,400)

drawPlatforms()

Object.keys(players).forEach(id=>{

updatePlayer(players[id])
drawPlayer(players[id])

})

updateProjectile()

drawHP()

requestAnimationFrame(draw)

}

function drawPlatforms(){

ctx.fillStyle="green"

platforms.forEach(p=>{
ctx.fillRect(p.x,p.y,p.w,p.h)
})

}

function updatePlayer(p){

p.vy += gravity
p.y += p.vy

platforms.forEach(pl=>{

let bottom = p.y + playerHeight

if(
p.x > pl.x-20 &&
p.x < pl.x + pl.w +20 &&
bottom >= pl.y &&
bottom <= pl.y + 12 &&
p.vy >= 0
){
p.y = pl.y - playerHeight
p.vy = 0
}

})

}

function drawPlayer(p){

ctx.font="28px Arial"
ctx.fillText("🐱",p.x,p.y+playerHeight)

}

window.moveLeft=function(){

let p = players[playerId]
p.x -= 20

updateServer()

}

window.moveRight=function(){

let p = players[playerId]
p.x += 20

updateServer()

}

window.jump=function(){

let p = players[playerId]

if(p.vy===0){
p.vy=-12
}

updateServer()

}

window.shoot=function(){

let p = players[playerId]

let angle = document.getElementById("angle").value
let power = document.getElementById("power").value

let rad = angle*Math.PI/180

projectile = {

x:p.x,
y:p.y,
vx:Math.cos(rad)*power,
vy:-Math.sin(rad)*power

}

}

function updateProjectile(){

if(!projectile) return

ctx.font="20px Arial"
ctx.fillText("🪨",projectile.x,projectile.y)

projectile.x += projectile.vx
projectile.y += projectile.vy

projectile.vy += 0.35

Object.keys(players).forEach(id=>{

if(id===playerId) return

let p = players[id]

let dx = projectile.x - p.x
let dy = projectile.y - p.y

let dist = Math.sqrt(dx*dx+dy*dy)

if(dist<25){

p.hp--

updateServer()

projectile=null

}

})

}

function drawHP(){

let text=""

Object.values(players).forEach(p=>{
text += p.name + " HP:" + p.hp + " | "
})

document.getElementById("hp").innerText=text

}

function updateServer(){

set(ref(db,"rooms/"+room+"/players/"+playerId),players[playerId])

}

draw()

</script>

</body>
</html>
