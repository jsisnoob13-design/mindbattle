<!DOCTYPE html>
<html>
<head>
    <title>Simple 1v1 Basketball</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a1d; color: white; margin: 0; overflow: hidden; }
        #gameCanvas { background-color: #222; border-bottom: 8px solid #e67e22; display: block; margin: auto; cursor: crosshair; }
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; gap: 40px; pointer-events: none; }
        .score { background: rgba(0,0,0,0.8); padding: 10px 25px; border: 2px solid #f1c40f; font-size: 28px; border-radius: 8px; font-family: monospace; }
        #chatContainer { position: absolute; bottom: 20px; left: 20px; width: 250px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 5px; }
        #chatBox { height: 80px; overflow-y: auto; font-size: 11px; text-align: left; margin-bottom: 5px; }
        #chatInput { width: 100%; background: #333; border: 1px solid #444; color: white; padding: 4px; }
        #setup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 30px; border-radius: 12px; z-index: 10; border: 2px solid #e67e22; }
    </style>
</head>
<body>

<div id="setup">
    <h2>🏀 Simple 1v1 Basketball</h2>
    <input id="name" placeholder="Name">
    <input id="room" placeholder="Court Code">
    <button onclick="joinRoom()" style="padding:10px 20px; background:#e67e22; color:white; border:none; cursor:pointer;">ENTER ARENA</button>
</div>

<div class="ui">
    <div class="score" id="s1">0</div>
    <div style="font-size: 30px; color: #f1c40f; padding-top: 10px;">VS</div>
    <div class="score" id="s2">0</div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="chatContainer" style="display:none;">
    <div id="chatBox"></div>
    <input id="chatInput" placeholder="Press Enter to chat...">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
        authDomain: "mindbattle-f00a3.firebaseapp.com",
        databaseURL: "https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mindbattle-f00a3",
        storageBucket: "mindbattle-f00a3.firebasestorage.app",
        messagingSenderId: "286675354503",
        appId: "1:286675354503:web:00a87613f420cd07a30922"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 900; canvas.height = 500;

    let room = "", playerName = "", playerId = Math.random().toString(36).substring(7);
    let players = {}, ball = { x: 450, y: 150, vx: 0, vy: 0, holder: null };
    let myPos = { x: 150, y: 400, vy: 0, score: 0 };
    let lastClickTime = 0, lastKeyTime = { KeyA: 0, KeyD: 0 };
    let toast = { text: "", opacity: 0, x: 0, y: 0 };
    const gravity = 0.6;
    const keys = {};

    window.joinRoom = function() {
        playerName = document.getElementById("name").value || "Player";
        room = document.getElementById("room").value;
        if(!room) return;
        document.getElementById("setup").style.display = "none";
        document.getElementById("chatContainer").style.display = "block";
        onValue(ref(db, `rooms/${room}/players`), s => players = s.val() || {});
        onValue(ref(db, `rooms/${room}/ball`), s => { if(s.val() && ball.holder !== playerId) ball = s.val(); });
        onValue(ref(db, `rooms/${room}/chat`), s => {
            const cb = document.getElementById("chatBox"); cb.innerHTML = "";
            if(s.val()) Object.values(s.val()).slice(-5).forEach(m => cb.innerHTML += `<div><b>${m.name}:</b> ${m.text}</div>`);
            cb.scrollTop = cb.scrollHeight;
        });
        gameLoop();
    };

    window.addEventListener("keydown", e => {
        if(document.activeElement.id === 'chatInput') return;
        if((e.code === 'KeyA' || e.code === 'KeyD') && Date.now() - lastKeyTime[e.code] < 200) myPos.x += (e.code === 'KeyD' ? 70 : -70);
        lastKeyTime[e.code] = Date.now();
        keys[e.code] = true;
        if(e.key === "Enter") document.getElementById("chatInput").focus();
    });
    window.addEventListener("keyup", e => keys[e.code] = false);

    canvas.oncontextmenu = (e) => { // Right Click Steal
        e.preventDefault();
        Object.keys(players).forEach(id => {
            if(id !== playerId && ball.holder === id && Math.hypot(myPos.x - players[id].x, myPos.y - players[id].y) < 60) {
                ball.holder = playerId;
                update(ref(db, `rooms/${room}/ball`), ball);
            }
        });
    };

    canvas.addEventListener("mousedown", e => {
        if(e.button === 0 && ball.holder === playerId) {
            const now = Date.now();
            const inDunkZone = (myPos.x < 120 || myPos.x > 780);
            if(now - lastClickTime < 250 && inDunkZone) { // Double Click Dunk
                ball.vx = (myPos.x < 450 ? 12 : -12); ball.vy = 15;
                showToast("WHAT A DUNK!!");
                ball.holder = null;
            } else { // Normal Shot
                const rect = canvas.getBoundingClientRect();
                ball.vx = ((e.clientX - rect.left) - myPos.x) * 0.07;
                ball.vy = ((e.clientY - rect.top) - myPos.y) * 0.07;
                ball.holder = null;
            }
            lastClickTime = now;
            update(ref(db, `rooms/${room}/ball`), ball);
        }
    });

    function showToast(txt) { toast = { text: txt, opacity: 1, x: 450, y: 200 }; }

    function updateLogic() {
        if(keys['KeyA']) myPos.x -= 5; if(keys['KeyD']) myPos.x += 5;
        if(keys['KeyW'] && myPos.y >= 400) myPos.vy = -13;
        myPos.vy += gravity; myPos.y += myPos.vy;
        if(myPos.y > 400) { myPos.y = 400; myPos.vy = 0; }

        if(!ball.holder) {
            ball.vy += gravity; ball.x += ball.vx; ball.y += ball.vy;
            if(ball.y > 480) { ball.y = 480; ball.vy *= -0.5; ball.vx *= 0.8; }
            if(ball.x < 0 || ball.x > 900) ball.vx *= -1;

            // Goal detection
            if(ball.y < 250 && ball.y > 200) {
                if(ball.x < 40 || ball.x > 860) {
                    const isThree = (ball.vx > 15 || ball.vx < -15 || ball.x > 450 && myPos.x < 450 || myPos.x > 600 && ball.x < 300);
                    myPos.score += isThree ? 3 : 2;
                    showToast(isThree ? "3 POINTS! CURRY!" : "NICE SHOT!");
                    ball = { x: 450, y: 150, vx: 0, vy: 0, holder: null };
                }
            }
            if(Math.hypot(myPos.x - ball.x, myPos.y - ball.y) < 45) ball.holder = playerId;
        } else if(ball.holder === playerId) { ball.x = myPos.x + 15; ball.y = myPos.y + 10; }

        update(ref(db, `rooms/${room}/players/${playerId}`), { x: myPos.x, y: myPos.y, score: myPos.score, name: playerName });
        if(ball.holder === playerId || !ball.holder) update(ref(db, `rooms/${room}/ball`), ball);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Lines
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.beginPath(); ctx.moveTo(450, 0); ctx.lineTo(450, 500); ctx.stroke(); // Half court
        ctx.beginPath(); ctx.arc(0, 230, 250, -Math.PI/2, Math.PI/2); ctx.stroke(); // Left Arc
        ctx.beginPath(); ctx.arc(900, 230, 250, Math.PI/2, 3*Math.PI/2); ctx.stroke(); // Right Arc

        ctx.fillStyle = "#34495e"; ctx.fillRect(0, 465, 900, 35); // Floor
        ctx.fillStyle = "#e74c3c"; ctx.fillRect(0, 230, 40, 8); ctx.fillRect(860, 230, 40, 8); // Hoops
        ctx.fillStyle = "#e67e22"; ctx.beginPath(); ctx.arc(ball.x, ball.y, 12, 0, Math.PI*2); ctx.fill(); // Ball

        Object.keys(players).forEach(id => {
            ctx.fillStyle = id === playerId ? "#3498db" : "#95a5a6";
            ctx.fillRect(players[id].x, players[id].y, 35, 60);
            ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.fillText(players[id].name, players[id].x, players[id].y - 10);
        });

        if(toast.opacity > 0) {
            ctx.fillStyle = `rgba(241, 196, 15, ${toast.opacity})`; ctx.font = "bold 30px Arial";
            ctx.fillText(toast.text, toast.x - 100, toast.y); toast.opacity -= 0.01; toast.y -= 0.5;
        }
        document.getElementById("s1").innerText = myPos.score;
    }

    function sendChat() {
        const i = document.getElementById("chatInput"); if(!i.value) return;
        push(ref(db, `rooms/${room}/chat`), { name: playerName, text: i.value }); i.value = ""; i.blur();
    }

    function gameLoop() { updateLogic(); draw(); requestAnimationFrame(gameLoop); }
</script>
</body>
</html>
