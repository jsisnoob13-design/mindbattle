<!DOCTYPE html>
<html>
<head>
    <title>Internal Data Monitor</title>
    <style>
        body { font-family: monospace; background: #e0e0e0; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: #333; }
        #wrap { display: none; gap: 15px; }
        canvas { background: #fff; border: 1px solid #aaa; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .side { width: 200px; display: flex; flex-direction: column; gap: 10px; }
        .box { background: #fff; border: 1px solid #aaa; padding: 10px; font-size: 11px; }
        .box-title { font-weight: bold; border-bottom: 1px solid #ccc; padding-bottom: 4px; margin-bottom: 6px; }
        #chat { height: 120px; overflow-y: auto; border-bottom: 1px solid #eee; margin-bottom: 5px; }
        input { width: 100%; border: 1px solid #ccc; font-family: monospace; font-size: 11px; padding: 5px; box-sizing: border-box; }
        #setup { background: white; padding: 30px; border: 1px solid #666; text-align: left; width: 220px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .win { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: white; border: 2px solid #333; padding: 30px; display: none; text-align: center; z-index: 100; }
        button { background: #f0f0f0; border: 1px solid #aaa; padding: 8px; cursor: pointer; width: 100%; font-family: monospace; font-weight: bold; }
        button:hover { background: #e0e0e0; }
    </style>
</head>
<body>

<div id="setup">
    <div style="font-weight: bold; margin-bottom: 15px; text-align: center;">[NODE_ACCESS_V4]</div>
    OP_ID: <input id="n" placeholder="Initials (e.g. ALX)" maxlength="4" style="margin-bottom: 10px;">
    ROOM: <input id="r" placeholder="000" style="margin-bottom: 15px;">
    <button onclick="start()">CONNECT</button>
</div>

<div id="wrap">
    <canvas id="c"></canvas>
    <div class="side">
        <div class="box">
            <div class="box-title">🏆 LEADERBOARD</div>
            <div id="lead">Awaiting...</div>
        </div>
        <div class="box">
            <div class="box-title">💬 COMMS</div>
            <div id="chat"></div>
            <input id="ci" placeholder="Press Enter to send...">
        </div>
    </div>
</div>

<div id="win" class="win">
    <h2 id="wt" style="margin-top:0;"></h2>
    <p>Session Concluded.</p>
    <button onclick="location.reload()">RESTART SEQUENCE</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, push, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const fb = initializeApp({
        apiKey: "AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
        authDomain: "mindbattle-f00a3.firebaseapp.com",
        databaseURL: "https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mindbattle-f00a3"
    });
    const db = getDatabase(fb);
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    
    // Hardcore Micro-Map Size
    canvas.width = 400; canvas.height = 600;

    let room, pName, pId = "P" + Math.random().toString(36).substr(2,6);
    let players = {}, barrels = [], fires = [], state = {active:true};
    let me = { x: 20, y: 560, vx: 0, vy: 0, color: `hsl(${Math.random()*360}, 65%, 45%)` };
    let keys = {}, lastSync = 0, lastTrigger = 0;

    // Level Generation (10 Floors, 55px gap)
    const plats = [];
    for(let i=0; i<10; i++){
        let y = 580 - (i*55);
        if(i===4 || i===7) { 
            plats.push({x:0, y:y, w:120}, {x:280, y:y, w:120}); // Broken Gaps
        } else { 
            plats.push({x: i%2===0 ? 0 : 40, y:y, w:360}); 
        }
    }
    const lads = [];
    for(let i=0; i<9; i++) lads.push({x: i%2===0 ? 360 : 20, y:580-((i+1)*55), w:20, h:55});

    window.start = () => {
        pName = document.getElementById("n").value.toUpperCase() || "OPR";
        room = document.getElementById("r").value || "999";
        document.getElementById("setup").style.display = "none";
        document.getElementById("wrap").style.display = "flex";

        // Cleanup on close
        onDisconnect(ref(db, `v4/${room}/p/${pId}`)).remove();

        // Listeners
        onValue(ref(db, `v4/${room}/p`), s => players = s.val() || {});
        onValue(ref(db, `v4/${room}/s`), s => {
            state = s.val() || {active:true};
            document.getElementById("win").style.display = state.active ? "none" : "block";
            if(state.win) document.getElementById("wt").innerText = state.win + " ASCENDED";
        });
        
        // Hazard Spawn Listener (Event-based syncing)
        onValue(ref(db, `v4/${room}/trigger`), s => {
            let t = s.val();
            if(!t || t.id === lastTrigger || !state.active) return;
            lastTrigger = t.id;
            
            if(t.type === 'B') barrels.push({x: t.x, y: t.y, vx: t.vx, kickTime: Date.now() + (Math.random()*1500 + 500)});
            if(t.type === 'F') fires.push({x: t.x, y: t.y, exp: Date.now() + 2000});
        });

        // Chat & Leaderboard
        onValue(ref(db, `v4/${room}/chat`), s => {
            const cb = document.getElementById("chat");
            cb.innerHTML = Object.values(s.val()||{}).map(m=>`<div><b>${m.n}:</b> ${m.m}</div>`).join("");
            cb.scrollTop = cb.scrollHeight;
        });
        onValue(ref(db, `v4/${room}/hist`), s => {
            const h = Object.values(s.val()||{});
            const wins = {}; h.forEach(x => wins[x.win] = (wins[x.win]||0)+1);
            document.getElementById("lead").innerHTML = Object.entries(wins).sort((a,b)=>b[1]-a[1]).map(e=>`[${e[1]}] ${e[0]}`).join("<br>") || "No data.";
        });

        setInterval(hostLoop, 1000);
        requestAnimationFrame(gameLoop);
    };

    // Chat Input
    document.getElementById("ci").onkeydown = e => {
        if(e.key==="Enter" && e.target.value.trim()){ 
            push(ref(db, `v4/${room}/chat`), {n:pName, m:e.target.value.trim()}); 
            e.target.value=""; 
        }
    };

    // Controls
    window.onkeydown = e => keys[e.code] = true;
    window.onkeyup = e => keys[e.code] = false;

    function resetPlayer(){ me.x=20; me.y=560; me.vy=0; }

    function hostLoop(){
        if(!state.active) return;
        const ids = Object.keys(players).sort();
        if(ids[0] === pId){ // If I am the Host
            // Spawn Barrel
            if(Math.random() > 0.4){
                let f = [1,2,3,5,6,8][Math.floor(Math.random()*6)];
                let isEven = f%2===0;
                set(ref(db, `v4/${room}/trigger`), {
                    id: Date.now(), type: 'B', 
                    x: isEven ? 5 : 385, y: 580-(f*55)-12, vx: isEven ? 2.5 : -2.5
                });
            }
            // Spawn Fire (Targets Leader)
            else if(Math.random() > 0.7){
                let tx = 200, ty = 600;
                Object.values(players).forEach(p=>{ if(p.y < ty) { ty=p.y; tx=p.x; } });
                set(ref(db, `v4/${room}/trigger`), { id: Date.now(), type: 'F', x: tx, y: ty });
            }
        }
    }

    function updatePhysics(){
        if(!state.active) return;
        
        // 1. Ladder Logic
        let onL = false;
        lads.forEach(l => { if(me.x+10 > l.x && me.x < l.x+l.w && me.y+12 > l.y && me.y < l.y+l.h) onL = true; });

        if(onL && keys['KeyS']){ 
            me.y -= 2.5; me.vy = 0; 
        } else {
            // Movement
            if(keys['KeyA']) me.x -= 2.5;
            if(keys['KeyD']) me.x += 2.5;

            // Soft Player Collision (Body Blocking)
            Object.keys(players).forEach(id => {
                if(id !== pId){
                    let p = players[id];
                    if(me.x < p.x+10 && me.x+10 > p.x && me.y < p.y+12 && me.y+12 > p.y){
                        me.x += (me.x < p.x) ? -1.5 : 1.5; // Slide off them
                    }
                }
            });

            // Jump & Gravity (Mathematically prevents skipping floors)
            if(keys['KeyW'] && me.vy === 0) me.vy = -6.5; 
            me.vy += 0.4; 
            me.y += me.vy;
        }

        // 2. Platform Collision (One-way down)
        plats.forEach(p => {
            if(me.vy >= 0 && me.x+10 > p.x && me.x < p.x+p.w && me.y+12 > p.y && me.y+12 < p.y+8){
                me.y = p.y-12; me.vy = 0;
            }
        });

        // Bounds
        if(me.y > 600) resetPlayer(); // Fell in gap
        if(me.x < 0) me.x = 0;
        if(me.x > 390) me.x = 390;

        // 3. Hazard Logic (Local update for smoothness)
        for(let i = barrels.length-1; i>=0; i--){
            let b = barrels[i];
            // The "Kick" (Speeds up randomly)
            let speed = (Date.now() > b.kickTime) ? b.vx * 1.8 : b.vx;
            b.x += speed;
            
            // Collision
            if(Math.hypot((me.x+5)-(b.x+5), (me.y+6)-(b.y+5)) < 11) resetPlayer();
            
            // Remove off-screen barrels
            if(b.x > 450 || b.x < -50) barrels.splice(i, 1);
        }

        for(let i = fires.length-1; i>=0; i--){
            let f = fires[i];
            if(Date.now() > f.exp) { fires.splice(i, 1); continue; }
            if(Math.hypot((me.x+5)-f.x, (me.y+6)-f.y) < 18) resetPlayer();
        }

        // 4. Win Condition
        if(me.y < 40){
            set(ref(db, `v4/${room}/s`), {active:false, win:pName});
            push(ref(db, `v4/${room}/hist`), {win:pName});
        }

        // 5. Throttled Network Sync (Saves Firebase quota and stops lag)
        if(Date.now() - lastSync > 40){
            update(ref(db, `v4/${room}/p/${pId}`), {x:me.x, y:me.y, n:pName, c:me.color});
            lastSync = Date.now();
        }
    }

    function drawGame(){
        ctx.clearRect(0,0,400,600);
        
        // Platforms & Ladders
        ctx.fillStyle = "#bbb"; plats.forEach(p => ctx.fillRect(p.x, p.y, p.w, 4));
        ctx.fillStyle = "#ddd"; lads.forEach(l => {
            ctx.fillRect(l.x, l.y, 3, l.h); ctx.fillRect(l.x+l.w-3, l.y, 3, l.h);
            for(let i=10; i<l.h; i+=12) ctx.fillRect(l.x, l.y+i, l.w, 3);
        });
        
        // Junior Kongs (Side Bosses)
        ctx.fillStyle = "#fcc"; [1,2,3,5,6,8].forEach(f => ctx.fillRect(f%2===0 ? 2 : 380, 580-(f*55)-18, 18, 18));
        
        // Big Boss (Top)
        ctx.fillStyle = "#d0c0ff"; ctx.fillRect(185 + Math.sin(Date.now()/500)*140, 5, 30, 30);
        
        // Hazards
        ctx.fillStyle = "#ff8c00"; barrels.forEach(b => ctx.fillRect(b.x, b.y, 10, 10));
        ctx.fillStyle = "#dc3545"; ctx.font="bold 16px monospace"; 
        fires.forEach(f => ctx.fillText(". .. ...", f.x-20, f.y+10));

        // Players
        Object.keys(players).forEach(id => {
            let p = players[id]; 
            ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 10, 12);
            ctx.fillStyle = "#333"; ctx.font = "9px monospace"; ctx.fillText(p.n, p.x-4, p.y-4);
        });
    }

    function gameLoop(){ 
        updatePhysics(); 
        drawGame(); 
        requestAnimationFrame(gameLoop); 
    }
</script>
</body>
</html>
