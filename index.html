<!DOCTYPE html>
<html>
<head>

<title>Emoji Wild Ones PvP</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
background:#222;
border:2px solid white;
}

button{
padding:8px;
margin:4px;
}

#chatBox{
height:150px;
width:320px;
overflow:auto;
border:1px solid white;
margin:auto;
padding:8px;
}

</style>

</head>

<body>

<h2>Emoji Wild Ones PvP</h2>

<input id="name" placeholder="name">
<input id="room" placeholder="room">

<button onclick="join()">Join</button>

<br><br>

<canvas id="game" width="800" height="400"></canvas>

<br>

Angle
<input id="angle" type="range" min="10" max="80" value="45">

Power
<input id="power" type="range" min="4" max="12" value="8">

<button onclick="shoot()">Throw</button>

<h3 id="hp"></h3>

<h2>Chat</h2>

<div id="chatBox"></div>

<input id="chatInput" placeholder="message">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"

const firebaseConfig = {

apiKey:"AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
authDomain:"mindbattle-f00a3.firebaseapp.com",
databaseURL:"https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"mindbattle-f00a3",
storageBucket:"mindbattle-f00a3.firebasestorage.app",
messagingSenderId:"286675354503",
appId:"1:286675354503:web:00a87613f420cd07a30922"

}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

let playerId = Math.random().toString(36).substring(2)

let room=""
let name=""

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let players={}
let projectiles=[]

const gravity=0.25

const platforms=[
{x:0,y:360,w:800,h:40},
{x:150,y:300,w:150,h:10},
{x:500,y:250,w:150,h:10}
]

function join(){

name=document.getElementById("name").value
room=document.getElementById("room").value

set(ref(db,"rooms/"+room+"/players/"+playerId),{

name:name,
x:100,
y:100,
hp:10

})

listen()

}

function listen(){

onValue(ref(db,"rooms/"+room),(snap)=>{

const data=snap.val()

if(!data)return

players=data.players||{}

})

}

function shoot(){

const angle=document.getElementById("angle").value*Math.PI/180
const power=document.getElementById("power").value

const p=players[playerId]

if(!p)return

projectiles.push({

x:p.x,
y:p.y,
vx:Math.cos(angle)*power,
vy:-Math.sin(angle)*power,
owner:playerId

})

}

function physics(){

projectiles.forEach(p=>{

p.vy+=gravity

p.x+=p.vx
p.y+=p.vy

if(p.y>400){

p.dead=true

}

for(let id in players){

if(id===p.owner)continue

let pl=players[id]

if(Math.abs(p.x-pl.x)<20 && Math.abs(p.y-pl.y)<20){

pl.hp--

p.dead=true

}

}

})

projectiles=projectiles.filter(p=>!p.dead)

}

function draw(){

ctx.clearRect(0,0,800,400)

ctx.fillStyle="#666"

platforms.forEach(pl=>{

ctx.fillRect(pl.x,pl.y,pl.w,pl.h)

})

for(let id in players){

let p=players[id]

ctx.fillStyle=id===playerId?"#00ff88":"#4da6ff"

ctx.beginPath()
ctx.arc(p.x,p.y,12,0,Math.PI*2)
ctx.fill()

ctx.fillText(p.name,p.x-10,p.y-20)

}

ctx.fillStyle="yellow"

projectiles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,5,0,Math.PI*2)
ctx.fill()

})

}

function updateHP(){

let text=""

for(let id in players){

let p=players[id]

text+=p.name+" ❤️"+p.hp+" | "

}

document.getElementById("hp").innerText=text

}

function gameLoop(){

physics()

draw()

updateHP()

requestAnimationFrame(gameLoop)

}

gameLoop()

document.getElementById("chatInput").addEventListener("keydown",e=>{

if(e.key==="Enter"){

set(ref(db,"rooms/"+room+"/chat/"+Date.now()),{

name:name,
text:e.target.value

})

e.target.value=""

}

})

onValue(ref(db,"rooms/"+room+"/chat"),snap=>{

const data=snap.val()

if(!data)return

let html=""

Object.values(data).forEach(m=>{

let color=m.name===name?"#00ff88":"#4da6ff"

html+=`<div style="color:${color}"><b>${m.name}:</b> ${m.text}</div>`

})

document.getElementById("chatBox").innerHTML=html

})

</script>

</body>
</html>
