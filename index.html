<!DOCTYPE html>
<html>
<head>
<title>Mind Battle PvP</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

button{
padding:10px;
margin:8px;
font-size:16px;
cursor:pointer;
}

.bar{
height:20px;
background:red;
width:200px;
margin:auto;
}

.energy{
background:orange;
}

#chatBox{
height:150px;
overflow:auto;
border:1px solid white;
width:300px;
margin:auto;
padding:10px;
}

</style>

</head>

<body>

<h1>Mind Battle PvP</h1>

<input id="name" placeholder="Your name">
<br><br>

<input id="room" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

<h3 id="status">Waiting...</h3>
<h3 id="enemyStatus"></h3>

<br>

<button onclick="sendAction('attack')">⚔ Attack</button>
<button onclick="sendAction('defend')">🛡 Defend</button>
<button onclick="sendAction('charge')">⚡ Charge</button>
<button onclick="sendAction('power')">💥 Power</button>

<h3>HP</h3>
<div class="bar" id="hpbar"></div>

<h3>Energy</h3>
<div class="bar energy" id="energybar"></div>

<h3 id="log"></h3>

<h2>Chat</h2>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Type message">
<button onclick="sendChat()">Send</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
authDomain:"mindbattle-f00a3.firebaseapp.com",
databaseURL:"https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"mindbattle-f00a3",
storageBucket:"mindbattle-f00a3.firebasestorage.app",
messagingSenderId:"286675354503",
appId:"1:286675354503:web:00a87613f420cd07a30922"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room=""
let playerId=Math.random().toString(36).substring(2)
let playerName=""

let hp=10
let energy=2

function updateUI(){

document.getElementById("hpbar").style.width=(hp*20)+"px"
document.getElementById("energybar").style.width=(energy*20)+"px"

}

window.joinRoom=function(){

playerName=document.getElementById("name").value
room=document.getElementById("room").value

document.getElementById("status").innerText="Joined "+room

listenActions()
listenChat()

}

function listenActions(){

const actionsRef=ref(db,"rooms/"+room+"/actions")

onValue(actionsRef,(snapshot)=>{

const data=snapshot.val()

if(!data)return

const players=Object.keys(data)

if(players.length==1){

if(players[0]!==playerId){

document.getElementById("enemyStatus").innerText="Opponent has chosen"

}

return
}

if(players.length<2)return

const a=data[players[0]]
const b=data[players[1]]

resolveBattle(a,b)

remove(actionsRef)

})

}

function resolveBattle(a,b){

let log=""

if(a.action==="attack" && b.action==="charge"){

log=a.name+" attacked charging enemy"

}

else if(a.action==="attack" && b.action==="defend"){

log="Attack blocked"

}

else if(a.action==="charge"){

energy++
log=a.name+" charged energy"

}

else if(a.action==="power"){

if(energy>=2){

energy-=2
log=a.name+" used power attack"

}
else{

log="Not enough energy"

}

}

document.getElementById("log").innerText=log

updateUI()

if(hp<=0){

document.getElementById("status").innerText="You lost"

}

}

window.sendAction=function(action){

document.getElementById("enemyStatus").innerText="Waiting for opponent..."

set(ref(db,"rooms/"+room+"/actions/"+playerId),{

name:playerName,
action:action

})

}

window.sendChat=function(){

const message=document.getElementById("chatInput").value

set(ref(db,"rooms/"+room+"/chat/"+Date.now()),{

name:playerName,
text:message

})

document.getElementById("chatInput").value=""

}

function listenChat(){

const chatRef=ref(db,"rooms/"+room+"/chat")

onValue(chatRef,(snapshot)=>{

const data=snapshot.val()

if(!data)return

let html=""

Object.values(data).forEach(msg=>{

html+=`<div><b>${msg.name}:</b> ${msg.text}</div>`

})

document.getElementById("chatBox").innerHTML=html

})

}

updateUI()

</script>

</body>
</html>
