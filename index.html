<!DOCTYPE html>
<html>
<head>
    <title>Simple 1v1 Basketball - Final Arena</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #1a1a1d; color: white; margin: 0; overflow: hidden; }
        #gameCanvas { background-color: #222; border-bottom: 8px solid #2c3e50; display: block; margin: auto; cursor: crosshair; }
        
        .ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; gap: 40px; pointer-events: none; }
        .score-box { background: rgba(0,0,0,0.8); padding: 10px 25px; border: 2px solid #f1c40f; font-size: 28px; border-radius: 8px; font-family: monospace; display: flex; flex-direction: column; align-items: center; }
        .energy-container { display: flex; gap: 3px; margin-top: 5px; }
        .energy-bar { width: 15px; height: 6px; background: #555; border-radius: 2px; transition: background 0.2s; }
        .energy-filled { background: #2ecc71; box-shadow: 0 0 5px #2ecc71; }

        #chatContainer { position: absolute; bottom: 20px; left: 20px; width: 250px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 5px; }
        #chatBox { height: 80px; overflow-y: auto; font-size: 11px; text-align: left; margin-bottom: 5px; color: #ddd; }
        #chatInput { width: 100%; background: #333; border: 1px solid #444; color: white; padding: 4px; }
        #setup { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; padding: 30px; border-radius: 12px; z-index: 10; border: 2px solid #e67e22; }
    </style>
</head>
<body>

<div id="setup">
    <h2>🏀 Simple 1v1 Basketball</h2>
    <input id="name" placeholder="Your Name" style="padding:10px; margin:5px;"><br>
    <input id="room" placeholder="Court Code" style="padding:10px; margin:5px;"><br>
    <button onclick="joinRoom()" style="padding:10px 20px; margin-top:10px; background:#e67e22; color:white; border:none; cursor:pointer; font-weight:bold; border-radius:4px;">ENTER ARENA</button>
</div>

<div class="ui">
    <div class="score-box">
        <span id="s1">0</span>
        <div class="energy-container" id="myEnergyUI"></div>
    </div>
    <div style="font-size: 30px; color: #f1c40f; padding-top: 10px;">VS</div>
    <div class="score-box">
        <span id="s2">0</span>
        <div class="energy-container" id="enemyEnergyUI"></div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="chatContainer" style="display:none;">
    <div id="chatBox"></div>
    <input id="chatInput" placeholder="Press Enter to chat...">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
        authDomain: "mindbattle-f00a3.firebaseapp.com",
        databaseURL: "https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mindbattle-f00a3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 900; canvas.height = 500;

    let room = "", playerName = "", playerId = Math.random().toString(36).substring(7);
    let players = {}, ball = { x: 450, y: 50, vx: 0, vy: 0, holder: null, scored: false };
    let myPos = { x: 150, y: 405, vy: 0, score: 0, energy: 3, isDunking: false, facingRight: true };
    
    let keys = {}, lastReleaseTime = { KeyA: 0, KeyD: 0 }, lastClickTime = 0;
    let isCharging = false, chargeStartTime = 0, mouseX = 0, mouseY = 0;
    let toast = { text: "", opacity: 0, x: 0, y: 0, color: "#f1c40f" };
    
    const gravity = 0.6;
    const playerWidth = 35;
    const playerHeight = 60;
    const ballRadius = 12;

    window.joinRoom = function() {
        playerName = document.getElementById("name").value || "Player";
        room = document.getElementById("room").value;
        if(!room) return;
        document.getElementById("setup").style.display = "none";
        document.getElementById("chatContainer").style.display = "block";
        
        onValue(ref(db, `rooms/${room}/players`), s => {
            players = s.val() || {};
            updateEnergyUI("myEnergyUI", myPos.energy);
            Object.keys(players).forEach(id => {
                if(id !== playerId) {
                    document.getElementById("s2").innerText = players[id].score || 0;
                    updateEnergyUI("enemyEnergyUI", players[id].energy || 0);
                }
            });
        });
        onValue(ref(db, `rooms/${room}/ball`), s => { if(s.val() && ball.holder !== playerId) ball = s.val(); });
        
        // Chat Sync
        onValue(ref(db, `rooms/${room}/chat`), s => {
            const cb = document.getElementById("chatBox"); cb.innerHTML = "";
            if(s.val()) Object.values(s.val()).slice(-5).forEach(m => cb.innerHTML += `<div><b>${m.name}:</b> ${m.text}</div>`);
            cb.scrollTop = cb.scrollHeight;
        });
        
        gameLoop();
    };

    function updateEnergyUI(elementId, energyCount) {
        let html = "";
        for(let i=0; i<5; i++) html += `<div class="energy-bar ${i < energyCount ? 'energy-filled' : ''}"></div>`;
        document.getElementById(elementId).innerHTML = html;
    }

    // --- INPUT HANDLING ---
    window.addEventListener("keyup", e => {
        keys[e.code] = false;
        if(e.code === 'KeyA' || e.code === 'KeyD') lastReleaseTime[e.code] = Date.now();
    });

    window.addEventListener("keydown", e => {
        if(document.activeElement.id === 'chatInput') {
            if(e.key === "Enter") {
                const i = document.getElementById("chatInput"); if(!i.value) return;
                push(ref(db, `rooms/${room}/chat`), { name: playerName, text: i.value }); i.value = ""; i.blur();
            }
            return;
        }
        if(e.key === "Enter") { document.getElementById("chatInput").focus(); return; }
        
        if(keys[e.code] || myPos.isDunking) return; 
        keys[e.code] = true;
        if(e.code === 'KeyA') myPos.facingRight = false;
        if(e.code === 'KeyD') myPos.facingRight = true;

        // Dash Logic (Requires key release + double tap)
        if((e.code === 'KeyA' || e.code === 'KeyD') && myPos.energy >= 1) {
            if(Date.now() - lastReleaseTime[e.code] < 200) {
                myPos.x += (e.code === 'KeyD' ? 90 : -90);
                myPos.energy--;
            }
        }
    });

    canvas.addEventListener("mousemove", e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    });

    // --- STEAL MECHANIC ---
    canvas.oncontextmenu = (e) => { 
        e.preventDefault();
        if(myPos.energy < 1 || myPos.isDunking) return;
        
        Object.keys(players).forEach(id => {
            if(id !== playerId && ball.holder === id && !players[id].isDunking) {
                let dist = Math.hypot(myPos.x - players[id].x, myPos.y - players[id].y);
                if(dist < 60) {
                    ball.holder = playerId;
                    ball.scored = false;
                    myPos.energy--;
                    update(ref(db, `rooms/${room}/ball`), ball);
                }
            }
        });
    };

    // --- SHOOTING & DUNKING ---
    canvas.addEventListener("mousedown", e => {
        if(e.button !== 0 || ball.holder !== playerId || myPos.isDunking) return;
        
        const now = Date.now();
        const inPaint = (myPos.x < 150 || myPos.x > 715);
        
        if(now - lastClickTime < 250 && inPaint) {
            isCharging = false; myPos.isDunking = true; ball.holder = null;
            myPos.vy = -12; myPos.x = myPos.x < 450 ? 20 : 845;
            ball.x = myPos.x + 15; ball.y = 220; ball.vx = 0; ball.vy = 20; 
            showToast("WHAT A DUNK!!", "#e74c3c");
            update(ref(db, `rooms/${room}/ball`), ball);
            setTimeout(() => { myPos.isDunking = false; }, 600);
        } else {
            isCharging = true; chargeStartTime = now;
        }
        lastClickTime = now;
    });

    window.addEventListener("mouseup", e => {
        if(e.button === 0 && isCharging && ball.holder === playerId) {
            isCharging = false;
            let chargeTime = Math.min((Date.now() - chargeStartTime) / 1000, 1.2);
            let powerMultiplier = 0.03 + (chargeTime * 0.08);
            ball.vx = (mouseX - myPos.x) * powerMultiplier;
            ball.vy = (mouseY - myPos.y) * powerMultiplier;
            ball.holder = null;
            update(ref(db, `rooms/${room}/ball`), ball);
        }
    });

    function showToast(txt, color = "#f1c40f") { toast = { text: txt, opacity: 1, x: 450, y: 150, color: color }; }

    // --- CORE LOGIC ---
    function updateLogic() {
        if(!myPos.isDunking) {
            let nextX = myPos.x;
            if(keys['KeyA']) nextX -= 5; 
            if(keys['KeyD']) nextX += 5;
            
            // Player Collision (Body Blocking)
            let collision = false;
            Object.keys(players).forEach(id => {
                if(id !== playerId) {
                    let ex = players[id].x, ey = players[id].y;
                    if(nextX < ex + playerWidth && nextX + playerWidth > ex && myPos.y < ey + playerHeight && myPos.y + playerHeight > ey) collision = true;
                }
            });
            if(!collision) myPos.x = nextX;
            if(keys['KeyW'] && myPos.y >= 405) myPos.vy = -13; // Jump
        }

        // Player Gravity & Bounds
        myPos.vy += gravity; myPos.y += myPos.vy;
        if(myPos.y > 405) { myPos.y = 405; myPos.vy = 0; }
        if(myPos.x < 0) myPos.x = 0;
        if(myPos.x > 900 - playerWidth) myPos.x = 900 - playerWidth;

        // --- CONCRETE BALL PHYSICS ---
        if(!ball.holder) {
            ball.vy += gravity; ball.x += ball.vx; ball.y += ball.vy;
            
            // Concrete Wall Collisions
            if(ball.y > 465 - ballRadius) { ball.y = 465 - ballRadius; ball.vy *= -0.6; ball.vx *= 0.8; }
            if(ball.y < ballRadius) { ball.y = ballRadius; ball.vy *= -0.5; }
            if(ball.x < ballRadius) { ball.x = ballRadius; ball.vx *= -0.5; }
            if(ball.x > 900 - ballRadius) { ball.x = 900 - ballRadius; ball.vx *= -0.5; }

            // Concrete Rim Collisions
            let distLeft = Math.hypot(ball.x - 40, ball.y - 230);
            let distRight = Math.hypot(ball.x - 860, ball.y - 230);
            if(distLeft < 15 + ballRadius || distRight < 15 + ballRadius) {
                ball.vx *= -0.7; ball.vy *= -0.7;
                // Anti-Sink push
                if(ball.x < 450) ball.x += 5; else ball.x -= 5;
                ball.y -= 5;
            }

            // Scoring Logic (Ball falls through hoop area downwards)
            if(ball.y > 220 && ball.y < 240 && ball.vy > 0 && !ball.scored) {
                if((ball.x < 35 && ball.x > 5) || (ball.x > 865 && ball.x < 895)) {
                    ball.scored = true; ball.vx *= 0.2; ball.vy *= 0.5; // Slow down through net
                    const isThree = (myPos.x >= 300 && myPos.x <= 600);
                    myPos.score += isThree ? 3 : 2;
                    if(myPos.energy < 5) myPos.energy += 1; // +1 Energy on Score
                    showToast(isThree ? "3 POINTS! CURRY!" : "NICE BUCKET!");
                }
            }
            
            // Loose Ball Pickup
            if(Math.hypot(myPos.x + 17 - ball.x, myPos.y + 30 - ball.y) < 40 && ball.y > 250) {
                ball.holder = playerId; ball.scored = false;
            }
        } else if(ball.holder === playerId) { 
            // Visible Dribble
            let bounceOffset = Math.sin(Date.now() / 120) * 12;
            ball.x = myPos.x + (myPos.facingRight ? 35 + ballRadius : -10 - ballRadius); 
            ball.y = myPos.y + 30 + bounceOffset; 
            ball.vx = 0; ball.vy = 0;
        }

        // Sync local updates to Firebase
        update(ref(db, `rooms/${room}/players/${playerId}`), { x: myPos.x, y: myPos.y, score: myPos.score, energy: myPos.energy, name: playerName, isDunking: myPos.isDunking });
        if(ball.holder === playerId || (!ball.holder && ball.vy !== 0)) update(ref(db, `rooms/${room}/ball`), ball);
    }

    // --- RENDER LOGIC ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Color Coded Floor
        ctx.fillStyle = "#ecf0f1"; ctx.fillRect(0, 465, 150, 35); ctx.fillRect(750, 465, 150, 35); // White (Paint)
        ctx.fillStyle = "#3498db"; ctx.fillRect(150, 465, 150, 35); ctx.fillRect(600, 465, 150, 35); // Blue (2pt)
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(300, 465, 300, 35); // Yellow (3pt)
        
        // Lines
        ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(450, 0); ctx.lineTo(450, 500); ctx.stroke();
        
        // Hoops
        ctx.fillStyle = "#e74c3c"; ctx.fillRect(0, 230, 40, 8); ctx.fillRect(860, 230, 40, 8); 
        
        // Players
        Object.keys(players).forEach(id => {
            const p = players[id]; ctx.fillStyle = id === playerId ? "#3498db" : "#95a5a6";
            if(p.isDunking) ctx.fillStyle = "#e74c3c"; // Red when invincible
            ctx.fillRect(p.x, p.y, playerWidth, playerHeight);
            ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center";
            ctx.fillText(p.name, p.x + 17, p.y - 10);
        });
        
        // Ball
        ctx.fillStyle = "#e67e22"; ctx.beginPath(); ctx.arc(ball.x, ball.y, ballRadius, 0, Math.PI*2); ctx.fill(); 
        
        // Charge Bar UI
        if(isCharging && ball.holder === playerId) {
            let chargeAmount = Math.min((Date.now() - chargeStartTime) / 1000, 1.2) / 1.2;
            ctx.fillStyle = `hsl(${120 - chargeAmount * 120}, 100%, 50%)`;
            ctx.fillRect(myPos.x - 5, myPos.y - 25, 45 * chargeAmount, 8);
            ctx.strokeStyle = "#fff"; ctx.strokeRect(myPos.x - 5, myPos.y - 25, 45, 8);
        }
        
        // Toast UI
        if(toast.opacity > 0) {
            ctx.fillStyle = toast.color; ctx.globalAlpha = toast.opacity; ctx.font = "bold 32px Arial"; ctx.textAlign = "center";
            ctx.fillText(toast.text, toast.x, toast.y); toast.opacity -= 0.01; toast.y -= 0.5; ctx.globalAlpha = 1.0;
        }
        
        // Score UI Update
        document.getElementById("s1").innerText = myPos.score;
    }

    function gameLoop() { updateLogic(); draw(); requestAnimationFrame(gameLoop); }
</script>
</body>
</html>
