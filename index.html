<!DOCTYPE html>
<html>
<head>

<title>Emoji Wild Ones PvP</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

canvas{
background:#222;
border:2px solid white;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

#chatBox{
height:160px;
width:320px;
overflow:auto;
border:1px solid white;
margin:auto;
padding:10px;
}

</style>

</head>

<body>

<h1>Emoji Wild Ones PvP</h1>

<input id="name" placeholder="Your name">
<input id="room" placeholder="Room">

<button onclick="joinRoom()">Join</button>

<br><br>

<canvas id="game" width="800" height="400"></canvas>

<div id="domainUI" style="display:none">

<h2>⚔ DOMAIN MODE</h2>

<button onclick="domainAttack('punch')">👊 Punch</button>
<button onclick="domainAttack('kick')">🦵 Kick</button>
<button onclick="domainAttack('block')">🛡 Block</button>

<p id="domainTimer"></p>

</div>

<br>

Angle
<input id="angle" type="range" min="10" max="80" value="45">

Power
<input id="power" type="range" min="2" max="12" value="6">

<button onclick="shoot()">Throw 🪨</button>

<h3 id="hp"></h3>

<h3 id="result"></h3>

<button onclick="restartGame()">Restart</button>

<h2>Chat</h2>

<div id="chatBox"></div>

<input id="chatInput" placeholder="message">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"

const firebaseConfig = {

apiKey:"AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
authDomain:"mindbattle-f00a3.firebaseapp.com",
databaseURL:"https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"mindbattle-f00a3",
storageBucket:"mindbattle-f00a3.firebasestorage.app",
messagingSenderId:"286675354503",
appId:"1:286675354503:web:00a87613f420cd07a30922"

}

const app = initializeApp(firebaseConfig)
const db = getDatabase(app)

let playerId = Math.random().toString(36).substring(2)

let room=""
let playerName=""

let combo=0
let hp=10

function joinRoom(){

playerName=document.getElementById("name").value
room=document.getElementById("room").value

set(ref(db,"rooms/"+room+"/players/"+playerId),{

name:playerName,
hp:10,
combo:0

})

listenRoom()

}

function listenRoom(){

onValue(ref(db,"rooms/"+room),(snapshot)=>{

const data=snapshot.val()

if(!data) return

drawPlayers(data)

if(data.domain && data.domain.active){

enterDomain(data.domain.start)

}

})

}

function drawPlayers(data){

let text=""

Object.values(data.players||{}).forEach(p=>{

text+=p.name+" HP:"+p.hp+" | "

})

document.getElementById("hp").innerText=text

}

function shoot(){

set(ref(db,"rooms/"+room+"/shots/"+Date.now()),{

player:playerName

})

combo++

if(combo>=3){

activateDomain()

combo=0

}

}

function activateDomain(){

set(ref(db,"rooms/"+room+"/domain"),{

active:true,
start:Date.now()

})

}

function enterDomain(start){

document.getElementById("domainUI").style.display="block"

startDomainTimer(start)

}

function startDomainTimer(start){

let interval=setInterval(()=>{

let time=Math.floor((Date.now()-start)/1000)

let remain=10-time

document.getElementById("domainTimer").innerText="Time: "+remain

if(remain<=0){

clearInterval(interval)

set(ref(db,"rooms/"+room+"/domain"),{

active:false

})

document.getElementById("domainUI").style.display="none"

}

},1000)

}

function domainAttack(type){

set(ref(db,"rooms/"+room+"/domainAttack/"+Date.now()),{

player:playerName,
type:type

})

}

function restartGame(){

hp=10
combo=0

document.getElementById("result").innerText=""

}

document.getElementById("chatInput").addEventListener("keydown",e=>{

if(e.key==="Enter"){

set(ref(db,"rooms/"+room+"/chat/"+Date.now()),{

name:playerName,
text:e.target.value

})

e.target.value=""

}

})

onValue(ref(db,"rooms/"+room+"/chat"),(snapshot)=>{

const data=snapshot.val()

if(!data) return

let html=""

Object.values(data).forEach(msg=>{

let color=msg.name===playerName?"#00ff88":"#4da6ff"

html+=`<div style="color:${color}"><b>${msg.name}:</b> ${msg.text}</div>`

})

document.getElementById("chatBox").innerHTML=html

document.getElementById("chatBox").scrollTop=99999

})

</script>

</body>
</html>
