<!DOCTYPE html>
<html>
<head>
<title>宇宙胡扯对战</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

button{
padding:8px;
margin:5px;
font-size:14px;
cursor:pointer;
}

#actions{
width:400px;
margin:auto;
}

#chatBox{
height:150px;
overflow:auto;
border:1px solid white;
width:320px;
margin:auto;
padding:10px;
}

#history{
width:320px;
margin:auto;
text-align:left;
border:1px solid white;
padding:10px;
max-height:150px;
overflow:auto;
}

</style>
</head>

<body>

<h1>宇宙胡扯对战</h1>

<input id="name" placeholder="Your name">

<br><br>

<input id="room" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

<h3 id="status">Waiting...</h3>

<h3>Your HP</h3>
<div id="hpDisplay"></div>

<h3>Opponent HP</h3>
<div id="enemyHpDisplay"></div>

<br>

<div id="actions"></div>

<h3 id="log"></h3>

<h3>Round History</h3>
<div id="history"></div>

<br>

<button onclick="newGame()">New Game</button>

<h2>Chat</h2>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Type message">
<button onclick="sendChat()">Send</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
authDomain:"mindbattle-f00a3.firebaseapp.com",
databaseURL:"https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"mindbattle-f00a3",
storageBucket:"mindbattle-f00a3.firebasestorage.app",
messagingSenderId:"286675354503",
appId:"1:286675354503:web:00a87613f420cd07a30922"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const items=[
"榴莲","拖鞋","老板","外星人","WiFi","程序员",
"咖啡","猫","辣椒","AI","deadline","熊猫"
]

const jokes=[
"因为宇宙运行规律如此",
"因为程序员没有睡觉",
"因为老板今天心情不好",
"因为WiFi突然断线",
"因为猫踩了路由器",
"因为熊猫太可爱",
"因为deadline来了",
"因为AI升级了",
"因为拖鞋是亚洲神器",
"因为榴莲太臭了"
]

let room=""
let playerName=""
let playerId=Math.random().toString(36).substring(2)

let hp=10
let enemyHp=10
let round=1

function randomJoke(){
return jokes[Math.floor(Math.random()*jokes.length)]
}

function generateButtons(){

const container=document.getElementById("actions")

items.forEach((item,i)=>{

let btn=document.createElement("button")
btn.innerText=item
btn.onclick=()=>sendAction(i)

container.appendChild(btn)

})

}

window.joinRoom=function(){

playerName=document.getElementById("name").value
room=document.getElementById("room").value

document.getElementById("status").innerText="Joined "+room

listenActions()
listenChat()

}

function listenActions(){

const actionsRef=ref(db,"rooms/"+room+"/actions")

onValue(actionsRef,(snapshot)=>{

const data=snapshot.val()
if(!data)return

const players=Object.keys(data)

if(players.length<2)return

const a=data[players[0]]
const b=data[players[1]]

resolveBattle(a,b)

remove(actionsRef)

})

}

function resolveBattle(a,b){

let pIndex=a.player===playerId?a.action:b.action
let eIndex=a.player===playerId?b.action:a.action

let diff=(pIndex-eIndex+items.length)%items.length

let winner="Draw"

if(diff===0){
winner="Draw"
}

else if(diff<=5){
enemyHp--
winner=playerName+" win"
}

else{
hp--
winner="Opponent win"
}

let joke=randomJoke()

let resultText=

items[pIndex]+" vs "+items[eIndex]+
"\n"+winner+
"\n"+joke

document.getElementById("log").innerText=resultText

const historyText=
"R"+round+" "+items[pIndex]+" vs "+items[eIndex]+" → "+winner

const historyDiv=document.getElementById("history")

historyDiv.innerHTML+=historyText+"<br>"

round++

updateUI()

}

window.sendAction=function(action){

set(ref(db,"rooms/"+room+"/actions/"+playerId),{

name:playerName,
player:playerId,
action:action

})

}

function updateUI(){

let hearts=""
let enemyHearts=""

for(let i=0;i<hp;i++) hearts+="❤️ "
for(let i=0;i<enemyHp;i++) enemyHearts+="❤️ "

document.getElementById("hpDisplay").innerText=hearts
document.getElementById("enemyHpDisplay").innerText=enemyHearts

if(hp<=0){
document.getElementById("status").innerText="💀 You lost"
}

if(enemyHp<=0){
document.getElementById("status").innerText="🏆 You win"
}

}

window.newGame=function(){

hp=10
enemyHp=10
round=1

document.getElementById("history").innerHTML=""
document.getElementById("log").innerText=""
document.getElementById("status").innerText="New Game"

updateUI()

}

window.sendChat=function(){

const message=document.getElementById("chatInput").value

set(ref(db,"rooms/"+room+"/chat/"+Date.now()),{

name:playerName,
text:message

})

document.getElementById("chatInput").value=""

}

function listenChat(){

const chatRef=ref(db,"rooms/"+room+"/chat")

onValue(chatRef,(snapshot)=>{

const data=snapshot.val()
if(!data)return

let html=""

Object.values(data).forEach(msg=>{

let color=msg.name===playerName?"#4CAF50":"#00BFFF"

html+=`<div style="color:${color}"><b>${msg.name}:</b> ${msg.text}</div>`

})

document.getElementById("chatBox").innerHTML=html

})

}

document.getElementById("chatInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
sendChat()
}

})

generateButtons()
updateUI()

</script>

</body>
</html>
