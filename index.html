<!DOCTYPE html>
<html>
<head>
<title>宇宙胡扯对战</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

button{
padding:10px;
margin:6px;
font-size:16px;
cursor:pointer;
}

#options{
margin-top:10px;
}

#chatBox{
height:150px;
overflow:auto;
border:1px solid white;
width:320px;
margin:auto;
padding:10px;
}

#history{
width:320px;
margin:auto;
text-align:left;
border:1px solid white;
padding:10px;
max-height:150px;
overflow:auto;
}

</style>
</head>

<body>

<h1>宇宙胡扯对战</h1>

<input id="name" placeholder="Your name">

<br><br>

<input id="room" placeholder="Room code">
<button onclick="joinRoom()">Join Room</button>

<h3 id="status">Waiting...</h3>

<div id="options"></div>

<h3 id="log"></h3>

<h3>Round History</h3>
<div id="history"></div>

<br>

<button onclick="newGame()">New Game</button>

<h2>Chat</h2>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Type message">
<button onclick="sendChat()">Send</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
authDomain:"mindbattle-f00a3.firebaseapp.com",
databaseURL:"https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"mindbattle-f00a3",
storageBucket:"mindbattle-f00a3.firebasestorage.app",
messagingSenderId:"286675354503",
appId:"1:286675354503:web:00a87613f420cd07a30922"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

let playerId=Math.random().toString(36).substring(2)
let playerName=""
let room=""
let round=1

const items=[
"猫","WiFi","老板","程序员","咖啡","拖鞋","榴莲","熊猫",
"AI","deadline","辣椒","外星人","老师","考试","闹钟",
"枕头","键盘","Bug","奶茶","手机","电池","马桶",
"雨伞","龙卷风","乌龟","月亮","火山","袜子","披萨","作业"
]

const jokes=[
"因为猫踩了路由器",
"因为老板突然开会",
"因为程序员三天没睡",
"因为WiFi断线",
"因为AI升级了",
"因为熊猫太可爱",
"因为deadline来了",
"因为榴莲太臭",
"因为拖鞋是亚洲神器",
"因为咖啡续命成功",
"因为Bug出现了",
"因为手机没电",
"因为奶茶加珍珠",
"因为老师看见了",
"因为考试突然出现",
"因为火山爆发",
"因为月亮变圆了",
"因为披萨太好吃",
"因为乌龟走太慢",
"因为龙卷风来了",
"因为马桶堵了",
"因为闹钟响了",
"因为枕头太舒服",
"因为雨伞飞走了",
"因为袜子失踪",
"因为电池耗尽",
"因为键盘坏了",
"因为作业太多",
"因为外星人降临",
"因为辣椒太辣"
]

let currentOptions=[]
let myChoice=null

function random3(){

let shuffled=[...items].sort(()=>0.5-Math.random())
return shuffled.slice(0,3)

}

function renderOptions(){

const container=document.getElementById("options")
container.innerHTML=""

currentOptions.forEach((opt,i)=>{

let btn=document.createElement("button")
btn.innerText=opt
btn.onclick=()=>choose(i)

container.appendChild(btn)

})

}

function startRound(){

currentOptions=random3()
myChoice=null

renderOptions()

}

function choose(i){

myChoice=i

set(ref(db,"rooms/"+room+"/actions/"+playerId),{
choice:i,
name:playerName
})

}

function resolveBattle(p1,p2){

let a=p1.choice
let b=p2.choice

let result="Draw"

if(a===b){
result="Draw"
}

else if(
(a===0 && b===1) ||
(a===1 && b===2) ||
(a===2 && b===0)
){
result=p1.name+" win"
}

else{
result=p2.name+" win"
}

let joke=jokes[Math.floor(Math.random()*jokes.length)]

document.getElementById("log").innerText=
currentOptions[a]+" vs "+currentOptions[b]+"\n"+result+"\n"+joke

let historyText=
"R"+round+" "+currentOptions[a]+" vs "+currentOptions[b]+" → "+result

document.getElementById("history").innerHTML+=historyText+"<br>"

round++

setTimeout(startRound,3000)

}

function listenActions(){

const actionsRef=ref(db,"rooms/"+room+"/actions")

onValue(actionsRef,(snapshot)=>{

const data=snapshot.val()
if(!data)return

const players=Object.values(data)

if(players.length===2){

resolveBattle(players[0],players[1])
remove(actionsRef)

}

})

}

window.joinRoom=function(){

playerName=document.getElementById("name").value
room=document.getElementById("room").value

document.getElementById("status").innerText="Joined "+room

listenActions()
listenChat()

startRound()

}

window.newGame=function(){

round=1
document.getElementById("history").innerHTML=""
startRound()

}

window.sendChat=function(){

const message=document.getElementById("chatInput").value

set(ref(db,"rooms/"+room+"/chat/"+Date.now()),{
name:playerName,
text:message
})

document.getElementById("chatInput").value=""

}

function listenChat(){

const chatRef=ref(db,"rooms/"+room+"/chat")

onValue(chatRef,(snapshot)=>{

const data=snapshot.val()
if(!data)return

let html=""

Object.values(data).forEach(msg=>{

let color=msg.name===playerName?"#4CAF50":"#00BFFF"

html+=`<div style="color:${color}"><b>${msg.name}:</b> ${msg.text}</div>`

})

document.getElementById("chatBox").innerHTML=html

})

}

document.getElementById("chatInput").addEventListener("keypress",function(e){
if(e.key==="Enter") sendChat()
})

</script>

</body>
</html>
