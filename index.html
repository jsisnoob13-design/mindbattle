<!DOCTYPE html>
<html>
<head>
    <title>Mind Battle: Gun Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: #111;
            color: white;
            padding: 20px;
        }
        .game-container {
            max-width: 500px;
            margin: auto;
            background: #222;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #444;
        }
        button {
            padding: 10px 15px; margin: 5px; font-size: 16px; cursor: pointer;
            background: #444; color: white; border: none; border-radius: 5px;
        }
        button:hover { background: #666; }
        .btn-gun { background: #d63031; }
        
        #chatBox {
            height: 150px; overflow-y: auto; border: 1px solid #444;
            background: #000; margin: 15px 0; padding: 10px; text-align: left;
        }
        .chat-msg { margin-bottom: 5px; font-size: 14px; border-bottom: 1px solid #1a1a1a; padding-bottom: 2px; }
        .hp-display { font-size: 20px; margin: 10px 0; letter-spacing: 2px; }
        input { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
        #status { color: #fdcb6e; font-weight: bold; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Mind Battle ⚔️</h1>

    <div id="setup">
        <input id="name" placeholder="Your Name">
        <input id="room" placeholder="Room Code">
        <button onclick="joinRoom()" style="background: #00b894;">Join Game</button>
    </div>

    <div id="gameArea" style="display:none;">
        <h3 id="status">Waiting for players...</h3>
        <p id="enemyStatus">Choose your action!</p>

        <div class="hp-section">
            <div>Opponent: <span id="enemyHpNum">10</span>/10</div>
            <div id="enemyHpDisplay" class="hp-display"></div>
            <hr style="border: 0.5px solid #444">
            <div>You: <span id="hpNum">10</span>/10</div>
            <div id="hpDisplay" class="hp-display"></div>
        </div>

        <div id="controls">
            <button onclick="sendAction('rock')">🪨 Rock</button>
            <button onclick="sendAction('paper')">📄 Paper</button>
            <button onclick="sendAction('scissors')">✂️ Scissors</button>
            <button class="btn-gun" onclick="sendAction('gun')">🔫 Gun</button>
        </div>
        <p id="gunStatus" style="font-size: 12px; color: #ff7675;"></p>
        <h4 id="log">---</h4>
        
        <div id="chatBox"></div>
        <input id="chatInput" placeholder="Message..." style="width: 60%;">
        <button onclick="sendChat()" style="background: #6c5ce7;">Send</button>

        <button id="newGameBtn" onclick="newGame()" style="display:none; background: #0984e3; width: 100%; margin-top:10px;">RESET GAME</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDLRVCCETtUBIv_69cWMedH4vbIu-z7nwU",
        authDomain: "mindbattle-f00a3.firebaseapp.com",
        databaseURL: "https://mindbattle-f00a3-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mindbattle-f00a3",
        storageBucket: "mindbattle-f00a3.firebasestorage.app",
        messagingSenderId: "286675354503",
        appId: "1:286675354503:web:00a87613f420cd07a30922"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let room = "";
    let playerName = "";
    let playerId = Math.random().toString(36).substring(2);
    let hp = 10, enemyHp = 10, gunCooldown = 0;

    // Fixed Color Function: Generates a bright color for dark background
    function getNameColor(name) {
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
            hash = name.charCodeAt(i) + ((hash << 5) - hash);
        }
        // HSL: Brightness set to 75% for dark mode visibility
        return `hsl(${Math.abs(hash % 360)}, 85%, 75%)`;
    }

    window.joinRoom = function() {
        playerName = document.getElementById("name").value.trim() || "Player";
        room = document.getElementById("room").value.trim();
        if (!room) return alert("Enter a room code!");

        document.getElementById("setup").style.display = "none";
        document.getElementById("gameArea").style.display = "block";

        document.getElementById("chatInput").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendChat();
        });

        listenActions();
        listenChat();
        updateUI();
    };

    window.sendAction = function(action) {
        if (hp <= 0 || enemyHp <= 0) return;
        if (action === "gun" && gunCooldown > 0) return alert("Gun on cooldown!");
        set(ref(db, `rooms/${room}/actions/${playerId}`), { name: playerName, player: playerId, action: action });
        document.getElementById("enemyStatus").innerText = "Locked in!";
    };

    function listenActions() {
        onValue(ref(db, `rooms/${room}/actions`), (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            const keys = Object.keys(data);
            if (keys.length === 2) {
                const p1 = data[keys[0]];
                const p2 = data[keys[1]];
                resolveBattle(p1, p2);
                setTimeout(() => {
                    remove(ref(db, `rooms/${room}/actions`));
                    if (hp > 0 && enemyHp > 0) document.getElementById("enemyStatus").innerText = "Choose next move!";
                }, 1500);
            }
        });
    }

    function resolveBattle(p1, p2) {
        let myMove = p1.player === playerId ? p1.action : p2.action;
        let enemyMove = p1.player === playerId ? p2.action : p1.action;
        let res = "Draw";

        if (myMove === "gun" && enemyMove !== "gun") { enemyHp--; res = "You WIN! 🔫"; }
        else if (enemyMove === "gun" && myMove !== "gun") { hp--; res = "Lose (GUN) 💀"; }
        else if (myMove === enemyMove) res = "Draw!";
        else if ((myMove === "rock" && enemyMove === "scissors") || (myMove === "paper" && enemyMove === "rock") || (myMove === "scissors" && enemyMove === "paper")) { enemyHp--; res = "You Win! 🎉"; }
        else { hp--; res = "You Lose! 😢"; }

        if (myMove === "gun") gunCooldown = 4;
        if (gunCooldown > 0) gunCooldown--;
        document.getElementById("log").innerText = `${myMove.toUpperCase()} vs ${enemyMove.toUpperCase()}: ${res}`;
        updateUI();
    }

    window.sendChat = function() {
        const input = document.getElementById("chatInput");
        if (!input.value.trim()) return;
        push(ref(db, `rooms/${room}/chat`), { name: playerName, text: input.value });
        input.value = "";
    };

    function listenChat() {
        onValue(ref(db, `rooms/${room}/chat`), (snapshot) => {
            const data = snapshot.val();
            let html = "";
            if (data) {
                Object.values(data).slice(-15).forEach(m => {
                    // APPLY COLOR HERE
                    const col = getNameColor(m.name);
                    html += `<div class="chat-msg"><b style="color: ${col}">${m.name}:</b> ${m.text}</div>`;
                });
            }
            const cb = document.getElementById("chatBox");
            cb.innerHTML = html;
            cb.scrollTop = cb.scrollHeight;
        });
    }

    window.newGame = function() {
        hp = 10; enemyHp = 10; gunCooldown = 0;
        remove(ref(db, `rooms/${room}/actions`));
        remove(ref(db, `rooms/${room}/chat`));
        document.getElementById("newGameBtn").style.display = "none";
        document.getElementById("log").innerText = "Game Reset!";
        updateUI();
    };

    function updateUI() {
        document.getElementById("hpDisplay").innerText = "❤️".repeat(hp);
        document.getElementById("enemyHpDisplay").innerText = "❤️".repeat(enemyHp);
        document.getElementById("hpNum").innerText = hp;
        document.getElementById("enemyHpNum").innerText = enemyHp;
        document.getElementById("gunStatus").innerText = gunCooldown > 0 ? `Gun: ${gunCooldown}s` : "Gun READY";
        if (hp <= 0 || enemyHp <= 0) {
            document.getElementById("status").innerText = hp <= 0 ? "GAME OVER" : "VICTORY!";
            document.getElementById("newGameBtn").style.display = "block";
        }
    }
</script>
</body>
</html>
